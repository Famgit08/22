<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика HTTP-запросов</title>
    <!-- Подключаем Tailwind CSS для стилизации -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- 
    Классы Tailwind:
    - bg-gray-50: светлый фон
    - dark:bg-gray-900: темный фон для темной темы
    - text-gray-900: темный текст для светлой темы
    - dark:text-gray-100: светлый текст для темной темы
    - min-h-screen: минимальная высота на весь экран
    - transition-colors: плавное изменение цветов при смене темы
    - duration-300: длительность анимации 300мс
-->
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <!-- 
        container: центрирует содержимое
        mx-auto: автоматические отступы по бокам
        px-4: отступы по бокам 1rem (16px)
        py-10: отступы сверху/снизу 2.5rem (40px)
        max-w-4xl: максимальная ширина 56rem (896px)
    -->
    <div class="container mx-auto px-4 py-10 max-w-4xl">
        
        <!-- Шапка сайта с информацией о студенте -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">Практика HTTP-запросов</h1>
            <!-- Здесь нужно указать свои данные -->
            <p class="text-lg text-gray-600 dark:text-gray-400">
                Студент: Зиберева А.А. | Группа: __________
            </p>
        </header>

        <!-- Блок с кнопками для GET-запросов -->
        <!-- flex: флексбокс, flex-wrap: перенос на новую строку, gap-4: отступы между элементами, justify-center: центрирование -->
        <div class="flex flex-wrap gap-4 justify-center mb-10">
            <!-- Кнопка для загрузки 10 постов -->
            <button onclick="getAllPosts()" 
                class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition">
                1. Загрузить 10 постов
            </button>

            <!-- Кнопка для получения поста №5 -->
            <button onclick="getPost5()" 
                class="px-6 py-3 bg-gray-600 text-white font-medium rounded-lg shadow-md hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-300 transition">
                2. Получить пост №5
            </button>
        </div>

        <!-- Секция для создания нового поста (POST-запрос) -->
        <section class="mb-12">
            <h2 class="text-2xl font-semibold mb-4">Создать новый пост</h2>
            <!-- space-y-4: вертикальные отступы между дочерними элементами -->
            <div class="space-y-4 max-w-xl mx-auto">
                <!-- Поле для ввода заголовка поста -->
                <input id="title" type="text" placeholder="Заголовок поста" 
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800">
                
                <!-- Поле для ввода текста поста (многострочное) -->
                <textarea id="body" rows="4" placeholder="Текст поста..." 
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800"></textarea>
                
                <!-- Кнопка для отправки POST-запроса -->
                <button onclick="createPost()" 
                    class="w-full px-4 py-3 bg-green-600 text-white font-medium rounded-lg shadow-md hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-green-300 transition">
                    Отправить POST-запрос
                </button>
            </div>
        </section>

        <!-- Секция для отображения результатов -->
        <section>
            <h2 class="text-2xl font-semibold mb-4">Результат</h2>
            <!-- 
                resultDiv - сюда будут выводиться данные от сервера
                bg-white: белый фон
                dark:bg-gray-800: темно-серый фон для темной темы
                rounded-xl: большие скругления
                shadow-lg: большая тень
                p-6: внутренние отступы 1.5rem (24px)
                min-h-[200px]: минимальная высота 200px
                prose: стилизация текста (для контента)
                dark:prose-invert: инвертированные цвета для темной темы
                max-w-none: отключаем максимальную ширину от prose
            -->
            <div id="result" class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 min-h-[200px] prose dark:prose-invert max-w-none">
                Здесь появится ответ от сервера...
            </div>
        </section>
    </div>

    <!-- Подключаем JavaScript файл -->
    <script src="script.js"></script>
</body>
</html>
